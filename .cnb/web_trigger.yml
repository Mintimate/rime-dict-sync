branch:
    # 在所有分支显示同步按钮
  - buttons:
    - name: 同步万象词库
      event: web_trigger_sync_wanxiang
      isDefault: true
    - name: 同步拆字词库
      event: web_trigger_sync_radical
    - name: 同步雾凇英文词库
      event: web_trigger_sync_rime_ice_english
    # 临时任务或新增任务调试入口
    - name: 自定义同步词库
      event: web_trigger_sync
      inputs:
        # 同步shell选项
        sync_shell:
          name: 执行同步配方
          required: true
          type: select
          options:
            - name: 同步万象词库
              value: scripts/sync-config.sh configs/wanxiang.yaml
            - name: 同步拆字词库
              value: scripts/sync-config.sh configs/radical.yaml
            - name: 同步雾凇英文词库
              value: scripts/sync-rime-ice-english.sh
        # 项目合作者
        co_authors:
          name: 项目合作者
          required: true
          type: select
          options:
            - name: amzxyz
              value: "Co-authored-by: amzxyz <129564993+amzxyz@users.noreply.github.com>"
            - name: mirtlecn
              value: "Co-authored-by: mirtlecn <76689045+mirtlecn@users.noreply.github.com>"
            - name: iDvel
              value: "Co-authored-by: iDvel <1469815+iDvel@users.noreply.github.com>"
        # 更新目标地址
        update_target:
          name: 更新目标地址
          required: true
          type: radio
          default: dicts/
          options:
            - name: 更新到 dicts 目录
              value: dicts/
            - name: 更新到项目根目录
              value: /
